apiVersion: apps/v1
kind: Deployment
metadata:
  name: redbank-banking-agent
  labels:
    app.kubernetes.io/name: redbank-banking-agent
    protocol.kagenti.io/a2a: ""
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redbank-banking-agent
  template:
    metadata:
      labels:
        app: redbank-banking-agent
        kagenti.io/type: agent
    spec:
      serviceAccountName: redbank-banking-agent
      containers:
      - name: banking-agent
        image: image-registry.openshift-image-registry.svc:5000/${NAMESPACE}/redbank-banking-agent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
          protocol: TCP
        env:
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8001"
        - name: MCP_SERVER_URL
          value: "http://redbank-mcp-server:8000/mcp"
        - name: AGENT_URL
          value: "http://redbank-banking-agent:8001"
        # LLM configuration — set LLM_BASE_URL to your vLLM or OpenAI-compatible endpoint.
        - name: LLM_BASE_URL
          value: "${LLM_BASE_URL}"
        - name: LLM_MODEL
          value: "${LLM_MODEL}"
        # API key for the LLM endpoint (vLLM or OpenAI).
        # Create the secret: oc create secret generic llm-credentials --from-literal=OPENAI_API_KEY=<key>
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-credentials
              key: OPENAI_API_KEY
        # MLflow tracing — run 'make setup-mlflow' to create the mlflow-credentials secret.
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            secretKeyRef:
              name: mlflow-credentials
              key: MLFLOW_TRACKING_URI
              optional: true
        - name: MLFLOW_TRACKING_TOKEN
          valueFrom:
            secretKeyRef:
              name: mlflow-credentials
              key: MLFLOW_TRACKING_TOKEN
              optional: true
        - name: MLFLOW_TRACKING_INSECURE_TLS
          value: "true"
        - name: MLFLOW_EXPERIMENT_NAME
          value: "redbank-banking-agent"
---
apiVersion: v1
kind: Service
metadata:
  name: redbank-banking-agent
  labels:
    protocol.kagenti.io/a2a: ""
    kagenti.io/type: agent
    app.kubernetes.io/name: redbank-banking-agent
spec:
  selector:
    app: redbank-banking-agent
  ports:
  - name: http
    port: 8001
    targetPort: 8001
    protocol: TCP
  type: ClusterIP
